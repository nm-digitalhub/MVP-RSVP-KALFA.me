# Twilio Media Streams need WSS (WebSocket over TLS).
# Error 31920 = server did not return HTTP 101 (WebSocket upgrade).
# Use this block for the server that serves node.kalfa.me (e.g. upstream Node on port 4000).

# Example: server block for node.kalfa.me
# server {
#     listen 443 ssl;
#     server_name node.kalfa.me;
#     # ssl_certificate /path/to/fullchain.pem;
#     # ssl_certificate_key /path/to/privkey.pem;

location /media {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}

