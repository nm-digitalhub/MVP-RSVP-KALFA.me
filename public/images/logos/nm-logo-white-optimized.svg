<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" preserveAspectRatio="xMidYMid meet">
  <!-- NM-DigitalHub Logo - Professional Unified Design -->
  <!-- Bold frame + Elegant NM + Integrated signature -->

  <defs>
    <style>
      /* Bold Hexagon Frame - Thinner per request */
      .logo-frame {
        fill: none;
        stroke: #FFFFFF;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.95;
      }

      /* Thin Elegant NM Letters */
      .logo-letters {
        fill: none;
        stroke: #FFFFFF;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Handwritten Signature - INSIDE hexagon */
      .logo-signature {
        fill: none;
        stroke: #FFFFFF;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 1;
      }
    </style>
  </defs>

  <!-- Bold Hexagon Frame - ENLARGED with proper proportions -->
  <path class="logo-frame"
        d="M24 2 L41 10 L41 30 L24 38 L7 30 L7 10 Z"/>

  <!-- Elegant Thin NM Letters - CENTERED -->
  <g class="logo-letters">
    <!-- Letter N -->
    <path d="M15 16 L15 26"/>
    <path d="M15 16 L20 26"/>
    <path d="M20 16 L20 26"/>

    <!-- Letter M -->
    <path d="M24 26 L24 16"/>
    <path d="M24 16 L27.5 24"/>
    <path d="M27.5 24 L31 16"/>
    <path d="M31 16 L31 26"/>
  </g>

  <!-- ECG/Heartbeat Pulse Wave - Resembles "N" and "M" shape -->
  <!-- Like a cardiogram with dramatic peaks forming NM -->
  <path class="logo-signature"
        d="M10 33
           L12 33
           L13 28
           L14 33
           L15 32
           L16 28
           L17 35
           L18 30
           L20 33
           L21 33
           L22 29
           L23 33
           L24 31
           L25 29
           L26 35
           L27 31
           L28 33
           L30 33
           L31 30
           L32 33
           L34 33
           L35 31
           L36 33
           L37 33"/>

  <!-- Pulse ending dot -->
  <circle cx="38" cy="33" r="1.3" fill="#FFFFFF" opacity="0.95"/>
</svg>
