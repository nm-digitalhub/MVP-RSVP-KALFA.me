<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="c1-icon-title" viewBox="0 0 44 44" width="44" height="44">
  <title id="c1-icon-title">Kalfa</title>
  <defs>
    <linearGradient id="c1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A594F9"/>
      <stop offset="100%" stop-color="#5A3DE0"/>
    </linearGradient>
  </defs>
  <!-- Envelope body -->
  <rect x="2" y="8" width="40" height="28" rx="3" fill="url(#c1-grad)"/>
  <!-- Envelope flap fold (V shape) -->
  <path d="M2,8 L22,23 L42,8" fill="none" stroke="#C4B5FD" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Bottom corner folds -->
  <path d="M2,36 L16,25" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M42,36 L28,25" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Amber stamp -->
  <rect x="27" y="11" width="12" height="12" rx="2" fill="#F59E0B"/>
  <!-- K inside stamp (white lines) -->
  <line x1="30" y1="13.5" x2="30" y2="20.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="17" x2="36" y2="13.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="17" x2="36" y2="20.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
