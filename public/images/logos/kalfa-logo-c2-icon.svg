<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="c2-icon-title" viewBox="0 0 44 44" width="44" height="44">
  <title id="c2-icon-title">Kalfa</title>
  <defs>
    <linearGradient id="c2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B6FF5"/>
      <stop offset="100%" stop-color="#4A30D0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square badge -->
  <rect x="0" y="0" width="44" height="44" rx="10" fill="url(#c2-grad)"/>
  <!-- Geometric K — white strokes -->
  <!-- Vertical stem -->
  <line x1="14" y1="11" x2="14" y2="33" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Upper arm -->
  <line x1="14" y1="22" x2="30" y2="11" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Lower arm -->
  <line x1="14" y1="22" x2="30" y2="33" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Subtle connector dot at junction -->
  <circle cx="14" cy="22" r="2" fill="#FFFFFF" opacity="0.6"/>
</svg>
