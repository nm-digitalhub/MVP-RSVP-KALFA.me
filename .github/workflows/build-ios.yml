name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests during build'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite, curl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          cache-version: 1

      - name: Install Fastlane
        run: |
          gem install fastlane -NV
          gem install bundler

      - name: Configure NativePHP environment
        run: |
          # Set production environment variables
          echo "NATIVEPHP_APP_ID=me.kalfa.eventrsvp" >> $GITHUB_ENV
          echo "NATIVEPHP_APP_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          echo "NATIVEPHP_APP_VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "NATIVEPHP_START_URL=/mobile" >> $GITHUB_ENV
          echo "NATIVEPHP_DEEPLINK_SCHEME=kalfa" >> $GITHUB_ENV
          echo "NATIVEPHP_DEEPLINK_HOST=kalfa.me" >> $GITHUB_ENV
          echo "VITE_MOBILE_API_BASE_URL=https://kalfa.me" >> $GITHUB_ENV

          # Display versions
          php -v
          composer show nativephp/mobile | head -5
          fastlane --version

      - name: Import iOS certificates
        env:
          IOS_DISTRIBUTION_CERTIFICATE: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$IOS_DISTRIBUTION_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T cert \
            -A "/usr/bin/codesign --verify" \
            >/dev/null 2>&1

          # Import provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          echo "Certificates imported successfully"

      - name: Run NativePHP install
        run: |
          php artisan native:install --force
          echo "NativePHP installed successfully"

      - name: Build iOS app
        run: |
          php artisan native:build ios
        env:
          NATIVEPHP_APP_ID: ${{ env.NATIVEPHP_APP_ID }}
          NATIVEPHP_APP_VERSION: ${{ env.NATIVEPHP_APP_VERSION }}
          NATIVEPHP_APP_VERSION_CODE: ${{ env.NATIVEPHP_APP_VERSION_CODE }}
          NATIVEPHP_START_URL: /mobile
          NATIVEPHP_DEEPLINK_SCHEME: kalfa
          NATIVEPHP_DEEPLINK_HOST: kalfa.me

      - name: Package iOS app (Archive)
        run: |
          php artisan native:package ios
        env:
          NATIVEPHP_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          IOS_TEAM_ID: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Export IPA for TestFlight
        run: |
          # Find the built .app
          APP_PATH=$(find ~/Library/Developer/Xcode/Archives -name "*.app" -maxdepth 3 | head -1)
          APP_NAME=$(basename "$APP_PATH" .app)

          # Export IPA
          EXPORT_PATH="$RUNNER_TEMP/${APP_NAME}.ipa"

          # Build archive using xcodebuild
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${APP_NAME}.xcarchive" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist 'exportOptions.plist' \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Upload IPA to TestFlight
          xcrun altool --upload-app \
            --type ios \
            --file "$EXPORT_PATH" \
            --username "apple-developer@kalfa.me" \
            --password "@xcode:password"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-app-${{ github.run_number }}
          path: |
            nativephp/resources/
            nativephp/ios/
            ~/Library/Developer/Xcode/Archives/*.xcarchive
            ${{ env.EXPORT_PATH }}
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App ID**: me.kalfa.eventrsvp" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ env.NATIVEPHP_APP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Run Tests
    runs-on: macos-latest
    if: ${{ inputs.skip_tests != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite

      - name: Install dependencies
        run: |
          composer install --no-dev --prefer-dist
          npm ci

      - name: Run tests
        run: php artisan test --parallel

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack-send@v3
        with:
          status: ${{ job.status }}
          text: |
            iOS build ${{ job.status }}!
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
